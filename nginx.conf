server {
    listen 80;
    server_name plushietale.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name plushietale.com;

    ssl_certificate /etc/letsencrypt/live/plushietale.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/plushietale.com/privkey.pem;

    # API 요청 → 백엔드로 프록시
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 180s;
    }

    # OAuth2 로그인 시작 요청 → 백엔드로 프록시
    location /oauth2/authorization/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /login/oauth2/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 프론트엔드 정적 파일 서빙 (React Router 지원)
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
